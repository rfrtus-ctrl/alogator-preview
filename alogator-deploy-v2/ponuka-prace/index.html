<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Čoskoro · Alogator</title>
<meta http-equiv="refresh" content="0;url=/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--signal:#E66748;--graphite:#1A1D1E;--porcelain:#F9F3ED;--graphite-500:#6B7174}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--porcelain);color:var(--graphite);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.box{max-width:480px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--signal);margin-bottom:16px}
.eyebrow::before{content:'• '}
h1{font-family:'Geist',sans-serif;font-weight:500;font-size:40px;letter-spacing:-0.025em;margin-bottom:12px}
h1 em{font-style:italic;color:var(--signal)}
p{font-size:15px;color:var(--graphite-500);margin-bottom:28px;line-height:1.6}
a{display:inline-block;background:var(--graphite);color:var(--porcelain);padding:12px 24px;border-radius:999px;text-decoration:none;font-size:14px;font-weight:500}
</style>
</head>
<body>
<div class="box">
  <div class="eyebrow">pripravujeme</div>
  <h1>Čoskoro <em>tu</em>.</h1>
  <p>Táto stránka sa práve stavia. Medzitým sa vráťte na domovskú stránku.</p>
  <a href="/">← Domov</a>
</div>
</body>
</html>
